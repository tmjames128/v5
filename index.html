        ctx.fillText(db>0?'+'+db:String(db), dialCX+Math.cos(ang)*lr, dialCY+Math.sin(ang)*lr+2);
      }
    }
    ctx.textBaseline='alphabetic';

    // needle
    const pct=Math.max(0,Math.min(1,(s-DB_MIN)/(DB_MAX-DB_MIN)));
    const needleAng=Math.PI + pct*Math.PI;
    const nLen=dialR*0.88;
    const ncos=Math.cos(needleAng), nsin=Math.sin(needleAng);

    // shadow
    ctx.shadowBlur=8; ctx.shadowColor='rgba(255,160,40,0.5)';
    ctx.strokeStyle='rgba(255,200,70,0.95)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(dialCX - ncos*dialR*0.12, dialCY - nsin*dialR*0.12);
    ctx.lineTo(dialCX + ncos*nLen, dialCY + nsin*nLen);
    ctx.stroke();
    ctx.shadowBlur=0;

    // pivot dot
    ctx.beginPath(); ctx.arc(dialCX,dialCY,4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,210,80,0.85)';
    ctx.shadowBlur=6; ctx.shadowColor='rgba(255,160,40,0.8)';
    ctx.fill(); ctx.shadowBlur=0;

    // ── dBu digital readout ──────────────────────────────────────
    const rdY=cy+mH*0.39;
    ctx.fillStyle='rgba(255,200,60,0.65)';
    ctx.font=`bold ${Math.max(10,mW*0.075)}px "Space Mono",monospace`;
    ctx.textAlign='center';
    ctx.fillText((s>=0?'+':'')+s.toFixed(1)+' dBu', dialCX, rdY+mH*0.09);

    // ── channel label ────────────────────────────────────────────
    ctx.font=`bold ${Math.max(8,mW*0.055)}px "Space Mono",monospace`;
    ctx.fillStyle='rgba(200,160,50,0.35)';
    ctx.textAlign='left';
    ctx.fillText(label, cx-mW/2+pad, cy-mH/2+mH*0.09);

    // ── brand strip ───────────────────────────────────────────────
    ctx.font=`${Math.max(6,mW*0.038)}px "Space Mono",monospace`;
    ctx.fillStyle='rgba(180,140,40,0.2)';
    ctx.textAlign='center';
    ctx.fillText('VU · POWER OUTPUT', cx, cy+mH/2-7);
  }

  // roundRect helper (canvas path, no fill/stroke)
  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  window.drawVU=function(){
    // solid dark background
    ctx.fillStyle='#0a0804';
    ctx.fillRect(0,0,W,H);

    // derive pseudo-stereo from odd/even bins
    let sumL=0,sumR=0;
    for(let i=0;i<bufferLen;i++){
      if(i%2===0) sumL+=freqData[i]; else sumR+=freqData[i];
    }
    updateCh(ch.L, sumL/(bufferLen/2*255));
    updateCh(ch.R, sumR/(bufferLen/2*255));

    // layout: two meters side by side, centred
    const gap=W*0.03;
    const mW=Math.min(W*0.44, 340);
    const mH=Math.min(H*0.62, 320);
    const totalW=mW*2+gap;
    const startX=(W-totalW)/2;
    const mY=H/2;

    drawMeter(startX+mW/2,        mY, mW, mH, ch.L, 'CH · L');
    drawMeter(startX+mW+gap+mW/2, mY, mW, mH, ch.R, 'CH · R');

    // top brand plate
    ctx.font=`${Math.max(9,W*0.012)}px "Space Mono",monospace`;
    ctx.fillStyle='rgba(180,140,40,0.18)';
    ctx.textAlign='center';
    ctx.fillText('STEREO POWER AMPLIFIER  ·  MODEL VU-2', W/2, mY-mH/2-12);
  };

  // show fsBtn when audio starts
  ['startBtn','sysAudioBtn'].forEach(id=>{
    document.getElementById(id).addEventListener('click',()=>{
      setTimeout(()=>document.getElementById('fsBtn').classList.add('visible'),700);
    });
  });
})();

// ═══════════════════════════════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════════════════════════════
(function(){
  const btn   = document.getElementById('fsBtn');
  const label = document.getElementById('fsLabel');
  const path  = document.getElementById('fsPath');

  const ICON_EXPAND  = 'M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z';
  const ICON_COMPRESS= 'M5 3H3v6h2V5h4V3H5zm14 0h-4v2h4v4h2V3h-2zM3 15v6h6v-2H5v-4H3zm16 2h-4v2h6v-6h-2v4z';

  function isFS(){
    return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
  }

  function updateBtn(){
    if(isFS()){
      label.textContent='Exit';
      path.setAttribute('d', ICON_COMPRESS);
      btn.title='Exit Fullscreen';
    } else {
      label.textContent='Fullscreen';
      path.setAttribute('d', ICON_EXPAND);
      btn.title='Enter Fullscreen';
    }
  }

  btn.addEventListener('click',()=>{
    if(!isFS()){
      const el=document.documentElement;
      (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);
    }
  });

  document.addEventListener('fullscreenchange',updateBtn);
  document.addEventListener('webkitfullscreenchange',updateBtn);
  document.addEventListener('mozfullscreenchange',updateBtn);
})();

// ═══════════════════════════════════════════════════════════════
// BACK BUTTON — stop audio, hide HUD, return to idle screen
// ═══════════════════════════════════════════════════════════════
(function(){
  const backBtn = document.getElementById('backBtn');

  // Show alongside fullscreen button when audio starts
  ['startBtn','sysAudioBtn'].forEach(id=>{
    document.getElementById(id).addEventListener('click',()=>{
      setTimeout(()=>backBtn.classList.add('visible'), 700);
    });
  });

  backBtn.addEventListener('click',()=>{
    // Stop audio context
    if(audioCtx){
      audioCtx.close().catch(()=>{});
      audioCtx=null; analyser=null; freqData=null; timeData=null;
    }

    // Exit fullscreen if active
    const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
    if(isFS){
      (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen)
        .call(document).catch(()=>{});
    }

    // Reset feedback buffers so next session starts clean
    fractalCanvas=null; scopePhosphor=null; tcFbuf=null; kaBuf=null;

    // Hide all HUD elements
    document.getElementById('panel').classList.remove('visible');
    document.getElementById('topHud').classList.remove('visible');
    document.getElementById('srcBadge').classList.remove('visible');
    document.getElementById('fsBtn').classList.remove('visible');
    backBtn.classList.remove('visible');

    // Show idle screen
    document.getElementById('idle').classList.remove('hidden');
  });
})();
</script>
